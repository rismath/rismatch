<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RisMatch | Speed Challenge 🧠⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.92);
            --primary: #FF7E5F;
            --secondary: #764BA2;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Nunito', sans-serif;
            color: #2D3436;
            height: 100vh; overflow: hidden; touch-action: manipulation;
            display: flex; align-items: center; justify-content: center; margin: 0;
        }

        /* Modern Glass Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 92%; max-width: 380px;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute; width: 300px; height: 300px;
            background: linear-gradient(to right, #FF7E5F, #FEB47B);
            filter: blur(80px); border-radius: 50%; z-index: 1; opacity: 0.5;
            animation: move 20s infinite alternate;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }

        .game-title { font-family: 'Baloo 2', cursive; font-weight: 800; letter-spacing: -1px; }

        /* Modern Tile System */
        .tile {
            background: white;
            border-radius: 1.2rem;
            font-family: 'Baloo 2', cursive;
            font-size: 2.2rem;
            color: #4834D4;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px solid transparent;
        }
        
        .tile:active { transform: scale(0.9); }
        
        .tile.selected {
            background: #4834D4;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(72, 52, 212, 0.3);
        }

        .tile.correct { background: #00B894 !important; color: white; transform: scale(0.95); opacity: 0.5; }
        .tile.error { background: #FF7675 !important; color: white; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .btn-modern {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border-radius: 1.2rem; padding: 1rem;
            font-size: 1.4rem; font-weight: 900; width: 100%;
            transition: all 0.2s; box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }
        .btn-modern:active { transform: scale(0.97); }

        .progress-container { background: rgba(0,0,0,0.05); border-radius: 10px; height: 6px; overflow: hidden; }
        .progress-bar { height: 100%; background: #4834D4; transition: width 1s linear; }

        /* Smooth UI transitions */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div id="game-root" class="w-full flex justify-center p-4"></div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function sfx(f, t, d) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(0.05, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        let state = {
            view: 'menu', score: 0, timer: 60, level: 1, 
            target: 0, tiles: [], selIdx: null,
            best: localStorage.getItem('risMatchBest') || 0,
            isProcessing: false 
        };

        function initLevel() {
            const range = 10 + (state.level * 8);
            state.target = Math.floor(Math.random() * range) + (10 + state.level * 2);
            let v1 = Math.floor(Math.random() * (state.target - 2)) + 1;
            let v2 = state.target - v1;
            let vals = [v1, v2];
            while(vals.length < 6) {
                let d = Math.floor(Math.random() * (state.target - 1)) + 1;
                if(!vals.includes(d) && !vals.some(v => v + d === state.target)) vals.push(d);
            }
            state.tiles = vals.sort(() => Math.random() - 0.5).map(v => ({ v, status: 'idle' }));
            state.selIdx = null;
            state.isProcessing = false;
        }

        function handleTap(i) {
            if (state.view !== 'play' || (state.isProcessing && state.tiles[i].status !== 'selected')) return;
            if (state.selIdx === i) {
                state.tiles[i].status = 'idle'; state.selIdx = null; render(); return;
            }
            sfx(440, 'sine', 0.1);
            if (state.selIdx === null) {
                state.selIdx = i; state.tiles[i].status = 'selected'; render();
            } else {
                state.isProcessing = true;
                if (state.tiles[state.selIdx].v + state.tiles[i].v === state.target) {
                    sfx(880, 'sine', 0.1);
                    state.score += (10 * state.level);
                    state.tiles[i].status = 'correct'; state.tiles[state.selIdx].status = 'correct';
                    render();
                    setTimeout(() => { if (state.score % 100 === 0) state.level++; initLevel(); render(); }, 250);
                } else {
                    sfx(220, 'triangle', 0.2);
                    state.tiles[i].status = 'error'; state.tiles[state.selIdx].status = 'error';
                    render();
                    let old = state.selIdx;
                    setTimeout(() => { state.tiles[i].status = 'idle'; state.tiles[old].status = 'idle'; state.selIdx = null; state.isProcessing = false; render(); }, 500);
                }
            }
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            state.view = 'play'; state.score = 0; state.timer = 60; state.level = 1;
            initLevel(); render();
            const clock = setInterval(() => {
                if (state.view !== 'play') { clearInterval(clock); return; }
                state.timer--;
                if(state.timer <= 0) {
                    state.view = 'end';
                    if(state.score > state.best) { state.best = state.score; localStorage.setItem('risMatchBest', state.score); }
                    render();
                } else {
                    document.getElementById('timer-val').innerText = state.timer + 's';
                    document.getElementById('progress-bar').style.width = (state.timer/60*100) + '%';
                }
            }, 1000);
        }

        function render() {
            const root = document.getElementById('game-root');
            if (state.view === 'menu') {
                root.innerHTML = `
                <div class="glass-card text-center fade-in">
                    <h1 class="game-title text-6xl text-indigo-900 mb-2">RisMatch</h1>
                    <p class="text-indigo-500 font-bold mb-8 uppercase tracking-widest text-xs">The Next Gen Math Challenge</p>
                    <div class="space-y-4 mb-8">
                        <div class="flex items-center gap-4 bg-white/50 p-4 rounded-2xl">
                            <span class="text-2xl">🎯</span>
                            <p class="text-left text-sm font-bold opacity-70">Find two numbers that add up to the target.</p>
                        </div>
                    </div>
                    <button onclick="startGame()" class="btn-modern game-title">START GAME</button>
                    <div class="mt-6 text-[10px] font-black opacity-30 uppercase">High Score: ${state.best}</div>
                </div>`;
            } else if (state.view === 'play') {
                root.innerHTML = `
                <div class="glass-card fade-in">
                    <div class="flex justify-between items-end mb-6">
                        <div><p class="text-[10px] font-black opacity-30 uppercase">Score</p><p class="game-title text-2xl text-indigo-600">${state.score}</p></div>
                        <div class="text-center"><p id="timer-val" class="game-title text-4xl text-indigo-900">${state.timer}s</p></div>
                        <div class="text-right"><p class="text-[10px] font-black opacity-30 uppercase">Level</p><p class="game-title text-2xl text-indigo-600">${state.level}</p></div>
                    </div>
                    <div class="progress-container mb-8"><div id="progress-bar" class="progress-bar" style="width:${(state.timer/60)*100}%"></div></div>
                    <div class="text-center mb-8">
                        <p class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em]">Target</p>
                        <h2 class="game-title text-9xl text-indigo-900 -mt-2">${state.target}</h2>
                    </div>
                    <div class="grid grid-cols-3 gap-4">
                        ${state.tiles.map((t, i) => `<div onclick="handleTap(${i})" class="tile ${t.status}">${t.v}</div>`).join('')}
                    </div>
                </div>`;
            } else {
                root.innerHTML = `
                <div class="glass-card text-center fade-in">
                    <h2 class="game-title text-4xl text-indigo-900 mb-2">Well Played!</h2>
                    <div class="text-xs font-black opacity-30 uppercase mb-8">You finished with</div>
                    <div class="game-title text-8xl text-indigo-600 mb-10">${state.score}</div>
                    <button onclick="startGame()" class="btn-modern game-title mb-4">TRY AGAIN</button>
                    <button onclick="state.view='menu';render()" class="text-sm font-bold opacity-40">Main Menu</button>
                </div>`;
            }
        }
        render();
    </script>
</body>
</html>
